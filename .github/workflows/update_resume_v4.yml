name: Naukri Resume Auto-Update

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 10 * * *'  # 4:00 PM IST
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome install
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: ChromeDriver install
        run: |
          VER=$(google-chrome --version | grep -oP '\d+' | head -1)
          DRV=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${VER}")
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/${DRV}/linux64/chromedriver-linux64.zip"
          unzip -q chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
          sudo chmod +x /usr/bin/chromedriver
          chromedriver --version

      - name: Python packages install
        run: pip install --quiet selenium==4.18.1

      - name: Resume update
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          GMAIL_USER: ${{ secrets.NAUKRI_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESUME_PATH: resume/your_resume.pdf
        run: python naukri_update_v6.py

      - name: Screenshots upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 5
          if-no-files-found: ignore
